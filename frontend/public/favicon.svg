<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Paper (behind) -->
  <g transform="translate(19, 16) rotate(8)">
    <rect x="-6" y="-8" width="12" height="16" rx="1.5" fill="none" stroke="#8a9db6" stroke-width="1.2"/>
    <line x1="-3.5" y1="-4" x2="3.5" y2="-4" stroke="#8a9db6" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3.5" y1="-1" x2="2.5" y2="-1" stroke="#8a9db6" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3.5" y1="2" x2="3" y2="2" stroke="#8a9db6" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Robot head -->
  <g transform="translate(13, 15)">
    <!-- Antenna -->
    <line x1="0" y1="-9" x2="0" y2="-7" stroke="#b4c0d0" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="-10" r="1.2" fill="#6680a0"/>
    <!-- Head -->
    <rect x="-7" y="-7" width="14" height="12" rx="2.5" fill="none" stroke="#b4c0d0" stroke-width="1.4"/>
    <!-- Eyes -->
    <rect x="-4.5" y="-3.5" width="3" height="2" rx="0.8" fill="#6680a0"/>
    <rect x="1.5" y="-3.5" width="3" height="2" rx="0.8" fill="#6680a0"/>
    <!-- Mouth -->
    <line x1="-3" y1="1.5" x2="3" y2="1.5" stroke="#8a9db6" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2" y1="3.5" x2="2" y2="3.5" stroke="#8a9db6" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
