services:
  gate:
    image: iezious/llmrp-gate:latest
    ports:
      - "8094:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: iezious/llmrp-api:latest
    env_file:
      - .env
    environment:
      - LLMRP_DB_PATH=/app/data/llmrp.db
    volumes:
      - ./data:/app/data
    expose:
      - "8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
